repos:
  - repo: local
    hooks:
      - id: sync-shared
        name: sync shared configs
        # Bootstrap: grab sync.sh from github-action-templates, run it with
        # no args so auto-detect picks up the `docker` language marker.
        # Offline-tolerant: if curl fails, the hook exits 0 and the commit
        # proceeds — drift is caught later in CI.
        entry: bash -c 'mkdir -p .shared; [ -x .shared/sync.sh ] || { curl -sfL --max-time 10 "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/sync.sh" -o .shared/sync.sh 2>/dev/null && chmod +x .shared/sync.sh; }; [ -x .shared/sync.sh ] && .shared/sync.sh; exit 0'
        language: system
        always_run: true
        pass_filenames: false

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
