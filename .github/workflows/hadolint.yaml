name: hadolint

# Bespoke: dockerfile linter for this image-publishing repo. The
# canonical hygiene group covers commits/PR-metadata/drift/renovate
# but not Dockerfile linting (no canonical group for it yet).

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  hadolint:
    uses: jr200-labs/github-action-templates/.github/workflows/lint_docker.yaml@master
    with:
      recursive: true
