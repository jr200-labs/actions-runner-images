name: release-please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    uses: jr200-labs/github-action-templates/.github/workflows/release_please.yaml@master
    with:
      release-type: simple
      target-branch: master
    secrets:
      app_private_key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}

  # When release-please creates a tag + GitHub Release, dispatch the docker build
  # for every image under images/*/ (currently just base).
  dispatch-build:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ vars.INTEGRATION_CLIENT_ID }}
          private-key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch build (base)
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          event-type: dispatch-build-docker-image
          client-payload: |-
            {
              "ref": "refs/tags/${{ needs.release.outputs.tag_name }}",
              "sha": "${{ needs.release.outputs.sha }}",
              "tag": "${{ needs.release.outputs.tag_name }}",
              "checkout-ref": "${{ needs.release.outputs.tag_name }}",
              "image": "base",
              "dockerfile": "images/base/Dockerfile",
              "platforms": ""
            }
