name: build-docker-image

on:
  repository_dispatch:
    types:
      - dispatch-build-docker-image

  workflow_dispatch:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"
      tag:
        description: docker-image-tag
        required: false
        type: string
        default: dev
      image:
        description: 'Image variant under images/ (e.g. base)'
        required: false
        type: string
        default: base
      dockerfile:
        description: 'Dockerfile path (overrides image-variant resolution)'
        required: false
        type: string
        default: ''
      platforms:
        description: platform-filter-json
        required: false
        type: string
        default: |-
          [ "linux/amd64", "linux/arm64" ]

jobs:
  configure:
    uses: jr200-labs/github-action-templates/.github/workflows/preconfigure.yaml@master
    with:
      event_name: ${{ toJson(github.event_name) }}
      event: ${{ toJson(github.event) }}

  resolve-dockerfile:
    needs: configure
    runs-on: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    outputs:
      dockerfile: ${{ steps.resolve.outputs.dockerfile }}
    steps:
      - name: Resolve dockerfile path
        id: resolve
        env:
          CTX: ${{ needs.configure.outputs.context }}
        run: |
          # Prefer explicit `dockerfile` from payload; otherwise synthesize
          # images/<image>/Dockerfile from the `image` key.
          df=$(echo "$CTX" | jq -r '.dockerfile // empty')
          if [ -z "$df" ]; then
            image=$(echo "$CTX" | jq -r '.image // "base"')
            df="images/${image}/Dockerfile"
          fi
          echo "resolved dockerfile: $df"
          echo "dockerfile=$df" >> "$GITHUB_OUTPUT"

  main:
    needs: [configure, resolve-dockerfile]
    uses: jr200-labs/github-action-templates/.github/workflows/build_docker_image_multiplatform.yaml@master
    with:
      checkout-ref: ${{ fromJson(needs.configure.outputs.context).checkout-ref }}
      registry_name: ghcr.io
      image_name: ${{ github.repository }}
      tag: ${{ fromJson(needs.configure.outputs.context).tag }}
      platforms: ${{ fromJson(needs.configure.outputs.context).platforms }}
      dockerfile: ${{ needs.resolve-dockerfile.outputs.dockerfile }}
    secrets:
      registry_username: ${{ github.actor }}
      registry_token: ${{ secrets.GITHUB_TOKEN }}
      client_id: ${{ vars.INTEGRATION_CLIENT_ID }}
      app_private_key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
